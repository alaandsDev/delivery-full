services:
  - type: web
    name: delivery-saas-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
